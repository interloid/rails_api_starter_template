services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rails_starter_template_development
    ports: [ "5433:5432" ]
    volumes: [ "pgdata:/var/lib/postgresql/data" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-local}
    env_file: [ .env.docker ]
    ports: [ "3000:3000" ]
    depends_on:
      db: { condition: service_healthy }

volumes:
  pgdata:
