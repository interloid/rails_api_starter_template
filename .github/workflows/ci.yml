name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  # Manual trigger — run CI on demand from the Actions tab without opening a PR.
  workflow_dispatch:

# Cancel superseded runs on the same branch to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: RuboCop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rubocop --parallel

  security:
    name: Brakeman & bundler-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Brakeman (static security scan)
        run: bundle exec brakeman --no-pager -q
      - name: bundler-audit (dependency CVEs)
        run: bundle exec bundler-audit check --update

  test:
    name: RSpec (with 80% coverage gate)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432
      # Specs run in TEST env, which decrypts config/credentials.yml.enc using
      # master.key (NOT the production key). JwtService needs jwt.secret from it.
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Prepare test database
        run: bin/rails db:test:prepare
      # SimpleCov exits non-zero below the 80% minimum, so this enforces coverage.
      - name: Run specs
        run: bundle exec rspec
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      # Build only (no registry configured). Add a push step + registry login when a
      # deploy target is chosen.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
