pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: "*.rb"
      run: bundle exec rubocop --autocorrect --force-exclusion {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    brakeman:
      run: bundle exec brakeman -q --no-summary
    bundler-audit:
      run: bundle exec bundler-audit check --update
